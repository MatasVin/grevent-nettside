<!DOCTYPE html>
<html lang="no">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kontakt oss – Grevent AS</title>
    <meta name="description" content="Ta kontakt med Grevent AS — vi svarer raskt med et uforpliktende tilbud.">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <style>
        :root {
            --color-bg: #ffffff;
            --color-bg-elevated: #f7f8fa;
            --color-border: #e2e5ea;
            --color-border-light: #d0d5dc;
            --color-text: #2d2d32;
            --color-text-muted: #58595b;
            --color-text-subtle: #8a8c90;
            --color-accent: #00aeef;
            --color-accent-hover: #009ad8;
            --color-accent-glow: rgba(0, 174, 239, 0.1);
            --color-accent-dark: #007bb5;
            --font-body: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            --font-mono: 'JetBrains Mono', monospace;
            --radius-sm: 8px;
            --radius-md: 12px;
            --radius-lg: 16px;
            --shadow-sm: 0 1px 3px rgba(0,0,0,0.06), 0 1px 2px rgba(0,0,0,0.04);
            --shadow-md: 0 4px 16px rgba(0,0,0,0.08);
            --transition: 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
        html { scroll-behavior: smooth; }
        body { font-family: var(--font-body); background: var(--color-bg); color: var(--color-text); line-height: 1.7; -webkit-font-smoothing: antialiased; overflow-x: hidden; }
        img { max-width: 100%; display: block; }
        a { color: var(--color-accent); text-decoration: none; transition: color var(--transition); }
        a:hover { color: var(--color-accent-hover); }
        .container { max-width: 1200px; margin: 0 auto; padding: 0 24px; }
        .section { padding: 80px 0; }
        .section-label { font-family: var(--font-mono); font-size: 0.8rem; font-weight: 500; color: var(--color-accent); text-transform: uppercase; letter-spacing: 3px; margin-bottom: 12px; }
        .section-title { font-size: clamp(2rem, 4vw, 2.8rem); font-weight: 700; line-height: 1.2; margin-bottom: 16px; }

        /* NAV */
        .nav { position: fixed; top: 0; left: 0; right: 0; z-index: 1000; background: rgba(255,255,255,0.92); backdrop-filter: blur(20px); border-bottom: 1px solid var(--color-border); transition: var(--transition); }
        .nav.scrolled { box-shadow: var(--shadow-sm); }
        .nav-inner { display: flex; align-items: center; justify-content: space-between; height: 72px; }
        .nav-logo img { height: 36px; width: auto; }
        .nav-links { display: flex; gap: 28px; list-style: none; align-items: center; }
        .nav-links a { color: var(--color-text-muted); font-size: 0.9rem; font-weight: 500; transition: color var(--transition); position: relative; }
        .nav-links a::after { content: ''; position: absolute; bottom: -4px; left: 0; width: 0; height: 2px; background: var(--color-accent); transition: width var(--transition); }
        .nav-links a:hover { color: var(--color-text); }
        .nav-links a:hover::after, .nav-links a.active::after { width: 100%; }
        .nav-links a.active { color: var(--color-text); }
        .nav-cta { background: var(--color-accent) !important; color: #fff !important; padding: 8px 20px !important; border-radius: 8px; font-weight: 600 !important; }
        .nav-cta:hover { background: var(--color-accent-hover) !important; transform: translateY(-1px); }
        .nav-cta::after { display: none !important; }
        .nav-toggle { display: none; background: none; border: none; cursor: pointer; padding: 8px; }
        .nav-toggle span { display: block; width: 24px; height: 2px; background: var(--color-text); margin: 6px 0; transition: var(--transition); }

        /* PAGE HEADER */
        .page-header { padding: 140px 0 72px; background: var(--color-bg-elevated); border-bottom: 1px solid var(--color-border); }
        .page-header h1 { font-size: clamp(2.2rem, 5vw, 3.4rem); font-weight: 800; line-height: 1.15; letter-spacing: -1px; margin-bottom: 16px; }
        .page-header p { font-size: 1.15rem; color: var(--color-text-muted); max-width: 580px; line-height: 1.8; }

        /* CONTACT */
        .contact-grid { display: grid; grid-template-columns: 1fr 1.2fr; gap: 64px; }
        .contact-info h3 { font-size: 1.5rem; font-weight: 700; margin-bottom: 16px; }
        .contact-info > p { color: var(--color-text-muted); margin-bottom: 32px; font-size: 1.05rem; }
        .contact-details { display: flex; flex-direction: column; gap: 20px; }
        .contact-item { display: flex; align-items: center; gap: 16px; }
        .contact-icon { width: 44px; height: 44px; border-radius: var(--radius-sm); background: var(--color-accent-glow); border: 1px solid var(--color-border); display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
        .contact-icon svg { width: 20px; height: 20px; color: var(--color-accent); }
        .contact-item-label { font-size: 0.8rem; color: var(--color-text-subtle); margin-bottom: 2px; }
        .contact-item-value { font-weight: 500; font-size: 0.95rem; }
        .contact-form { background: var(--color-bg); border: 1px solid var(--color-border); border-radius: var(--radius-lg); padding: 36px; box-shadow: var(--shadow-sm); }
        .form-group { margin-bottom: 20px; }
        .form-label { display: block; font-size: 0.85rem; font-weight: 500; margin-bottom: 6px; color: var(--color-text-muted); }
        .form-input, .form-textarea, .form-select { width: 100%; padding: 12px 16px; background: var(--color-bg-elevated); border: 1px solid var(--color-border); border-radius: var(--radius-sm); color: var(--color-text); font-family: var(--font-body); font-size: 0.95rem; transition: border-color var(--transition); }
        .form-input:focus, .form-textarea:focus, .form-select:focus { outline: none; border-color: var(--color-accent); box-shadow: 0 0 0 3px var(--color-accent-glow); background: var(--color-bg); }
        .form-textarea { min-height: 120px; resize: vertical; }
        .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
        .btn-submit { width: 100%; display: flex; align-items: center; justify-content: center; gap: 8px; padding: 14px 28px; border-radius: var(--radius-md); font-size: 0.95rem; font-weight: 600; cursor: pointer; transition: all var(--transition); border: none; font-family: var(--font-body); background: var(--color-accent); color: #fff; box-shadow: 0 4px 16px rgba(0,174,239,0.25); }
        .btn-submit:hover { background: var(--color-accent-hover); transform: translateY(-2px); box-shadow: 0 6px 24px rgba(0,174,239,0.35); }

        /* FOOTER */
        .footer { background: #2d2d32; color: #fff; padding: 48px 0 32px; }
        .footer-inner { display: flex; justify-content: space-between; align-items: flex-start; flex-wrap: wrap; gap: 32px; }
        .footer-brand { max-width: 240px; }
        .footer-logo img { height: 28px; width: auto; filter: brightness(0) invert(1); margin-bottom: 10px; }
        .footer-tagline { font-size: 0.85rem; color: rgba(255,255,255,0.5); line-height: 1.6; }
        .footer-nav-group h4 { font-size: 0.75rem; font-weight: 600; text-transform: uppercase; letter-spacing: 1.5px; color: rgba(255,255,255,0.35); margin-bottom: 14px; }
        .footer-nav-group a { display: block; font-size: 0.875rem; color: rgba(255,255,255,0.6); margin-bottom: 8px; transition: color var(--transition); }
        .footer-nav-group a:hover { color: #fff; }
        .footer-contact { font-size: 0.875rem; color: rgba(255,255,255,0.6); line-height: 2; }
        .footer-contact a { color: rgba(255,255,255,0.8); }
        .footer-contact a:hover { color: #fff; }
        .footer-bottom { margin-top: 36px; padding-top: 24px; border-top: 1px solid rgba(255,255,255,0.1); display: flex; justify-content: space-between; font-size: 0.8rem; color: rgba(255,255,255,0.4); }

        /* ANIMATIONS */
        .fade-up { opacity: 0; transform: translateY(30px); transition: opacity 0.6s ease, transform 0.6s ease; }
        .fade-up.visible { opacity: 1; transform: translateY(0); }
        @keyframes spin { to { transform: rotate(360deg); } }

        /* RESPONSIVE */
        @media (max-width: 768px) {
            .nav-links { display: none; position: absolute; top: 72px; left: 0; right: 0; background: rgba(255,255,255,0.98); backdrop-filter: blur(20px); border-bottom: 1px solid var(--color-border); flex-direction: column; padding: 24px; gap: 16px; }
            .nav-links.open { display: flex; }
            .nav-toggle { display: block; }
            .contact-grid { grid-template-columns: 1fr; gap: 40px; }
            .form-row { grid-template-columns: 1fr; }
            .section { padding: 60px 0; }
            .footer-inner { flex-direction: column; }
            .footer-bottom { flex-direction: column; text-align: center; gap: 8px; }
        }
        @media (min-width: 1024px) { .section { padding: 64px 0; } }

        /* DARK MODE */
        .theme-toggle { background: none; border: 1px solid var(--color-border); border-radius: var(--radius-sm); cursor: pointer; padding: 7px; display: flex; align-items: center; justify-content: center; color: var(--color-text-muted); transition: all var(--transition); margin-left: 4px; flex-shrink: 0; }
        .theme-toggle:hover { border-color: var(--color-accent); color: var(--color-accent); background: var(--color-accent-glow); }
        .icon-sun { display: none; }
        .icon-moon { display: block; }
        [data-theme="dark"] .icon-sun { display: block; }
        [data-theme="dark"] .icon-moon { display: none; }
        [data-theme="dark"] {
            --color-bg: #0f1117;
            --color-bg-elevated: #171b26;
            --color-border: #252836;
            --color-border-light: #2e3347;
            --color-text: #e8e9ef;
            --color-text-muted: #9899a6;
            --color-text-subtle: #6b6c7a;
        }
        [data-theme="dark"] .nav { background: rgba(15,17,23,0.92); border-color: var(--color-border); }
        [data-theme="dark"] .nav-links { background: rgba(15,17,23,0.98); }
        [data-theme="dark"] .contact-form { background: var(--color-bg-elevated); }
        [data-theme="dark"] .form-input,
        [data-theme="dark"] .form-textarea,
        [data-theme="dark"] .form-select { background: var(--color-bg); color: var(--color-text); }
        [data-theme="dark"] .footer { background: #080b10; }
        [data-theme="dark"] .page-header { background: var(--color-bg-elevated); }
    </style>
    <script>(function(){var t=localStorage.getItem('theme')||(window.matchMedia('(prefers-color-scheme: dark)').matches?'dark':'light');document.documentElement.setAttribute('data-theme',t)})();</script>
</head>
<body>

    <nav class="nav" id="navbar">
        <div class="container nav-inner">
            <a href="index.html" class="nav-logo"><img src="logo.png" alt="Grevent"></a>
            <ul class="nav-links" id="navLinks">
                <li><a href="om-oss.html">Om oss</a></li>
                <li><a href="utstyr.html">Utstyr</a></li>
                <li><a href="pakker.html">Pakkeløsninger</a></li>
                <li><a href="send-filer.html">Send filer</a></li>
                <li><a href="kontakt.html" class="nav-cta">Kontakt oss</a></li>
            </ul>
            <div style="display:flex;align-items:center;gap:4px;">
                <button class="theme-toggle" id="themeToggle" aria-label="Bytt tema">
                    <svg class="icon-sun" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></svg>
                    <svg class="icon-moon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
                </button>
                <button class="nav-toggle" id="navToggle" aria-label="Meny"><span></span><span></span><span></span></button>
            </div>
        </div>
    </nav>

    <div class="page-header">
        <div class="container">
            <div class="section-label">Kontakt</div>
            <h1 id="contact-title">La oss ta en prat</h1>
            <p id="contact-desc"></p>
        </div>
    </div>

    <section class="section">
        <div class="container">
            <div class="contact-grid fade-up">
                <div class="contact-info" id="contact-info"></div>
                <form class="contact-form" onsubmit="handleSubmit(event)" id="contact-form">
                    <div class="form-row">
                        <div class="form-group"><label class="form-label" for="name">Navn</label><input class="form-input" type="text" id="name" placeholder="Ditt navn" required></div>
                        <div class="form-group"><label class="form-label" for="company">Firma</label><input class="form-input" type="text" id="company" placeholder="Firmanavn"></div>
                    </div>
                    <div class="form-row">
                        <div class="form-group"><label class="form-label" for="email">E-post</label><input class="form-input" type="email" id="email" placeholder="din@epost.no" required></div>
                        <div class="form-group"><label class="form-label" for="phone">Telefon</label><input class="form-input" type="tel" id="phone" placeholder="XXX XX XXX"></div>
                    </div>
                    <div class="form-group"><label class="form-label" for="package-select">Interessert i</label><select class="form-select" id="package-select"></select></div>
                    <div class="form-group"><label class="form-label" for="message">Melding</label><textarea class="form-textarea" id="message" placeholder="Fortell oss om arrangementet ditt — dato, sted, antall deltakere, behov..." required></textarea></div>
                    <button type="submit" class="btn-submit">Send forespørsel <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg></button>
                </form>
            </div>
        </div>
    </section>

    <footer class="footer">
        <div class="container">
            <div class="footer-inner">
                <div class="footer-brand">
                    <div class="footer-logo"><img src="logo.png" alt="Grevent"></div>
                    <div class="footer-tagline">Teknisk produksjon for konferanser og events</div>
                </div>
                <div class="footer-nav-group">
                    <h4>Sider</h4>
                    <a href="om-oss.html">Om oss</a>
                    <a href="utstyr.html">Utstyr</a>
                    <a href="pakker.html">Pakkeløsninger</a>
                    <a href="send-filer.html">Send filer</a>
                    <a href="kontakt.html">Kontakt</a>
                </div>
                <div class="footer-contact" id="footer-contact"></div>
            </div>
            <div class="footer-bottom">
                <span>&copy; 2015–2026 Grevent AS. Alle rettigheter reservert.</span>
                <span id="footer-orgnr"></span>
            </div>
        </div>
    </footer>

    <script>
    const contactIcons = {
        epost: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/><polyline points="22,6 12,13 2,6"/></svg>',
        telefon: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07 19.5 19.5 0 0 1-6-6 19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72 12.84 12.84 0 0 0 .7 2.81 2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45 12.84 12.84 0 0 0 2.81.7A2 2 0 0 1 22 16.92z"/></svg>',
        lokasjon: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"/><circle cx="12" cy="10" r="3"/></svg>',
        orgnr: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><rect x="2" y="7" width="20" height="14" rx="2"/><path d="M16 21V5a2 2 0 0 0-2-2h-4a2 2 0 0 0-2 2v16"/></svg>'
    };

    function ensureArray(val) {
        if (Array.isArray(val)) return val;
        if (typeof val === 'string' && val.trim()) return val.split(',').map(s => s.trim());
        return [];
    }

    const navToggle = document.getElementById('navToggle');
    const navLinks = document.getElementById('navLinks');
    navToggle.addEventListener('click', () => navLinks.classList.toggle('open'));
    navLinks.querySelectorAll('a').forEach(link => link.addEventListener('click', () => navLinks.classList.remove('open')));

    const currentFile = window.location.pathname.split('/').pop() || 'index.html';
    navLinks.querySelectorAll('a').forEach(link => {
        if (link.getAttribute('href') === currentFile) link.classList.add('active');
    });

    const observer = new IntersectionObserver((entries) => {
        entries.forEach(entry => { if (entry.isIntersecting) entry.target.classList.add('visible'); });
    }, { threshold: 0.1, rootMargin: '0px 0px -50px 0px' });
    document.querySelectorAll('.fade-up').forEach(el => observer.observe(el));

    window.addEventListener('scroll', () => {
        document.getElementById('navbar').classList.toggle('scrolled', window.scrollY > 10);
    });

    document.getElementById('themeToggle').addEventListener('click', () => {
        const next = document.documentElement.getAttribute('data-theme') === 'dark' ? 'light' : 'dark';
        document.documentElement.setAttribute('data-theme', next);
        localStorage.setItem('theme', next);
    });

    fetch('content/site.json')
        .then(r => r.json())
        .then(data => {
            document.getElementById('contact-title').textContent = data.kontakt.tittel;
            document.getElementById('contact-desc').textContent = data.kontakt.beskrivelse;
            document.getElementById('contact-info').innerHTML = `
                <h3>${data.kontakt.firmanavn}</h3>
                <p>${data.kontakt.intro}</p>
                <div class="contact-details">
                    <div class="contact-item"><div class="contact-icon">${contactIcons.epost}</div><div><div class="contact-item-label">E-post</div><div class="contact-item-value"><a href="mailto:${data.kontakt.epost}">${data.kontakt.epost}</a></div></div></div>
                    <div class="contact-item"><div class="contact-icon">${contactIcons.telefon}</div><div><div class="contact-item-label">Telefon</div><div class="contact-item-value"><a href="tel:${data.kontakt.telefon.replace(/\s/g,'')}">${data.kontakt.telefon}</a></div></div></div>
                    <div class="contact-item"><div class="contact-icon">${contactIcons.lokasjon}</div><div><div class="contact-item-label">Lokasjon</div><div class="contact-item-value">${data.kontakt.lokasjon}</div></div></div>
                    <div class="contact-item"><div class="contact-icon">${contactIcons.orgnr}</div><div><div class="contact-item-label">Org.nr</div><div class="contact-item-value">${data.kontakt.orgnr}</div></div></div>
                </div>
            `;

            const sel = document.getElementById('package-select');
            sel.innerHTML = '<option value="">Velg pakke (valgfritt)</option>' +
                ensureArray(data.pakker.liste).map(p => `<option value="${(p.navn || '').toLowerCase()}">${p.navn || ''}</option>`).join('') +
                '<option value="skreddersydd">Skreddersydd løsning</option>';

            document.getElementById('footer-contact').innerHTML = `
                <a href="mailto:${data.kontakt.epost}">${data.kontakt.epost}</a><br>
                <a href="tel:${data.kontakt.telefon.replace(/\s/g,'')}">${data.kontakt.telefon}</a><br>
                ${data.kontakt.lokasjon}
            `;
            document.getElementById('footer-orgnr').textContent = `Org.nr: ${data.kontakt.orgnr}`;
        })
        .catch(err => console.error('Feil:', err));

    async function handleSubmit(e) {
        e.preventDefault();
        const form = e.target;
        const btn = form.querySelector('button[type="submit"]');
        const originalHTML = btn.innerHTML;

        btn.innerHTML = '<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" style="animation:spin 1s linear infinite"><path d="M21 12a9 9 0 1 1-6.22-8.56"/></svg> Sender...';
        btn.disabled = true;
        btn.style.opacity = '0.8';

        const data = new FormData();
        data.append('navn',    form.querySelector('#name').value);
        data.append('firma',   form.querySelector('#company').value);
        data.append('epost',   form.querySelector('#email').value);
        data.append('telefon', form.querySelector('#phone').value);
        data.append('pakke',   form.querySelector('#package-select').value);
        data.append('melding', form.querySelector('#message').value);

        try {
            const res = await fetch('send.php', { method: 'POST', body: data });
            const json = await res.json();
            if (json.success) {
                btn.innerHTML = '✓ ' + json.melding;
                btn.style.background = '#22c997';
                btn.style.opacity = '1';
                form.reset();
                setTimeout(() => { btn.innerHTML = originalHTML; btn.style.background = ''; btn.disabled = false; }, 5000);
            } else {
                throw new Error(json.melding || 'Ukjent feil');
            }
        } catch (err) {
            btn.innerHTML = '✗ ' + (err.message || 'Noe gikk galt. Prøv igjen.');
            btn.style.background = '#e53e3e';
            btn.style.opacity = '1';
            setTimeout(() => { btn.innerHTML = originalHTML; btn.style.background = ''; btn.disabled = false; }, 4000);
        }
    }
    </script>
</body>
</html>
