<!DOCTYPE html>
<html lang="no">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pakkeløsninger – Grevent AS</title>
    <meta name="description" content="Ferdige pakker for alle typer arrangement — fra enkel konferanse til stor produksjon.">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <style>
        :root {
            --color-bg: #ffffff;
            --color-bg-elevated: #f7f8fa;
            --color-border: #e2e5ea;
            --color-border-light: #d0d5dc;
            --color-text: #2d2d32;
            --color-text-muted: #58595b;
            --color-text-subtle: #8a8c90;
            --color-accent: #00aeef;
            --color-accent-hover: #009ad8;
            --color-accent-glow: rgba(0, 174, 239, 0.1);
            --color-accent-dark: #007bb5;
            --font-body: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            --font-mono: 'JetBrains Mono', monospace;
            --radius-sm: 8px;
            --radius-md: 12px;
            --radius-lg: 16px;
            --shadow-sm: 0 1px 3px rgba(0,0,0,0.06), 0 1px 2px rgba(0,0,0,0.04);
            --shadow-md: 0 4px 16px rgba(0,0,0,0.08);
            --transition: 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
        html { scroll-behavior: smooth; }
        body { font-family: var(--font-body); background: var(--color-bg); color: var(--color-text); line-height: 1.7; -webkit-font-smoothing: antialiased; overflow-x: hidden; }
        img { max-width: 100%; display: block; }
        a { color: var(--color-accent); text-decoration: none; transition: color var(--transition); }
        a:hover { color: var(--color-accent-hover); }
        .container { max-width: 1200px; margin: 0 auto; padding: 0 24px; }
        .section { padding: 80px 0; }
        .section-label { font-family: var(--font-mono); font-size: 0.8rem; font-weight: 500; color: var(--color-accent); text-transform: uppercase; letter-spacing: 3px; margin-bottom: 12px; }
        .section-title { font-size: clamp(2rem, 4vw, 2.8rem); font-weight: 700; line-height: 1.2; margin-bottom: 16px; }
        .section-subtitle { font-size: 1.1rem; color: var(--color-text-muted); max-width: 600px; margin-bottom: 48px; }

        /* NAV */
        .nav { position: fixed; top: 0; left: 0; right: 0; z-index: 1000; background: rgba(255,255,255,0.92); backdrop-filter: blur(20px); border-bottom: 1px solid var(--color-border); transition: var(--transition); }
        .nav.scrolled { box-shadow: var(--shadow-sm); }
        .nav-inner { display: flex; align-items: center; justify-content: space-between; height: 72px; }
        .nav-logo img { height: 36px; width: auto; }
        .nav-links { display: flex; gap: 28px; list-style: none; align-items: center; }
        .nav-links a { color: var(--color-text-muted); font-size: 0.9rem; font-weight: 500; transition: color var(--transition); position: relative; }
        .nav-links a::after { content: ''; position: absolute; bottom: -4px; left: 0; width: 0; height: 2px; background: var(--color-accent); transition: width var(--transition); }
        .nav-links a:hover { color: var(--color-text); }
        .nav-links a:hover::after, .nav-links a.active::after { width: 100%; }
        .nav-links a.active { color: var(--color-text); }
        .nav-cta { background: var(--color-accent) !important; color: #fff !important; padding: 8px 20px !important; border-radius: 8px; font-weight: 600 !important; }
        .nav-cta:hover { background: var(--color-accent-hover) !important; transform: translateY(-1px); }
        .nav-cta::after { display: none !important; }
        .nav-toggle { display: none; background: none; border: none; cursor: pointer; padding: 8px; }
        .nav-toggle span { display: block; width: 24px; height: 2px; background: var(--color-text); margin: 6px 0; transition: var(--transition); }

        /* PAGE HEADER */
        .page-header { padding: 140px 0 72px; background: var(--color-bg-elevated); border-bottom: 1px solid var(--color-border); }
        .page-header h1 { font-size: clamp(2.2rem, 5vw, 3.4rem); font-weight: 800; line-height: 1.15; letter-spacing: -1px; margin-bottom: 16px; }
        .page-header p { font-size: 1.15rem; color: var(--color-text-muted); max-width: 580px; line-height: 1.8; }

        /* BUTTONS */
        .btn { display: inline-flex; align-items: center; gap: 8px; padding: 14px 28px; border-radius: var(--radius-md); font-size: 0.95rem; font-weight: 600; cursor: pointer; transition: all var(--transition); border: none; font-family: var(--font-body); text-decoration: none; }
        .btn-primary { background: var(--color-accent); color: #fff; box-shadow: 0 4px 16px rgba(0,174,239,0.25); }
        .btn-primary:hover { background: var(--color-accent-hover); transform: translateY(-2px); box-shadow: 0 6px 24px rgba(0,174,239,0.35); color: #fff; }
        .btn-secondary { background: var(--color-bg); color: var(--color-text); border: 1px solid var(--color-border); }
        .btn-secondary:hover { background: var(--color-bg-elevated); border-color: var(--color-border-light); transform: translateY(-2px); color: var(--color-text); }

        /* PACKAGES */
        .package-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 24px; }
        .package-card { background: var(--color-bg); border: 1px solid var(--color-border); border-radius: var(--radius-lg); padding: 36px; position: relative; transition: all var(--transition); display: flex; flex-direction: column; }
        .package-card:hover { border-color: var(--color-border-light); transform: translateY(-4px); box-shadow: var(--shadow-md); }
        .package-card.featured { border-color: var(--color-accent); box-shadow: 0 0 40px rgba(0,174,239,0.08); }
        .package-badge { position: absolute; top: -1px; right: 24px; background: var(--color-accent); color: #fff; font-size: 0.75rem; font-weight: 600; padding: 6px 14px; border-radius: 0 0 var(--radius-sm) var(--radius-sm); text-transform: uppercase; letter-spacing: 1px; }
        .package-name { font-size: 1.3rem; font-weight: 700; margin-bottom: 8px; }
        .package-desc { font-size: 0.9rem; color: var(--color-text-muted); margin-bottom: 24px; }
        .package-price { margin-bottom: 28px; }
        .package-price-label { font-size: 0.8rem; color: var(--color-text-subtle); text-transform: uppercase; letter-spacing: 1px; margin-bottom: 4px; }
        .package-price-value { font-size: 2.2rem; font-weight: 800; letter-spacing: -1px; }
        .package-price-unit { font-size: 0.9rem; font-weight: 400; color: var(--color-text-muted); }
        .package-includes { list-style: none; margin-bottom: 32px; flex-grow: 1; }
        .package-includes li { padding: 8px 0; font-size: 0.9rem; color: var(--color-text-muted); display: flex; align-items: flex-start; gap: 12px; border-bottom: 1px solid var(--color-border); }
        .package-includes li:last-child { border-bottom: none; }
        .package-check { color: var(--color-accent); flex-shrink: 0; margin-top: 2px; }
        .package-card .btn { width: 100%; justify-content: center; }
        .pkg-footer-note { text-align: center; color: var(--color-text-subtle); font-size: 0.9rem; margin-top: 40px; }

        /* FOOTER */
        .footer { background: #2d2d32; color: #fff; padding: 48px 0 32px; }
        .footer-inner { display: flex; justify-content: space-between; align-items: flex-start; flex-wrap: wrap; gap: 32px; }
        .footer-brand { max-width: 240px; }
        .footer-logo img { height: 28px; width: auto; filter: brightness(0) invert(1); margin-bottom: 10px; }
        .footer-tagline { font-size: 0.85rem; color: rgba(255,255,255,0.5); line-height: 1.6; }
        .footer-nav-group h4 { font-size: 0.75rem; font-weight: 600; text-transform: uppercase; letter-spacing: 1.5px; color: rgba(255,255,255,0.35); margin-bottom: 14px; }
        .footer-nav-group a { display: block; font-size: 0.875rem; color: rgba(255,255,255,0.6); margin-bottom: 8px; transition: color var(--transition); }
        .footer-nav-group a:hover { color: #fff; }
        .footer-contact { font-size: 0.875rem; color: rgba(255,255,255,0.6); line-height: 2; }
        .footer-contact a { color: rgba(255,255,255,0.8); }
        .footer-contact a:hover { color: #fff; }
        .footer-bottom { margin-top: 36px; padding-top: 24px; border-top: 1px solid rgba(255,255,255,0.1); display: flex; justify-content: space-between; font-size: 0.8rem; color: rgba(255,255,255,0.4); }

        /* ANIMATIONS */
        .fade-up { opacity: 0; transform: translateY(30px); transition: opacity 0.6s ease, transform 0.6s ease; }
        .fade-up.visible { opacity: 1; transform: translateY(0); }

        /* RESPONSIVE */
        @media (max-width: 768px) {
            .nav-links { display: none; position: absolute; top: 72px; left: 0; right: 0; background: rgba(255,255,255,0.98); backdrop-filter: blur(20px); border-bottom: 1px solid var(--color-border); flex-direction: column; padding: 24px; gap: 16px; }
            .nav-links.open { display: flex; }
            .nav-toggle { display: block; }
            .package-grid { grid-template-columns: 1fr; }
            .section { padding: 60px 0; }
            .footer-inner { flex-direction: column; }
            .footer-bottom { flex-direction: column; text-align: center; gap: 8px; }
        }
        @media (min-width: 1024px) { .section { padding: 64px 0; } }
    </style>
</head>
<body>

    <nav class="nav" id="navbar">
        <div class="container nav-inner">
            <a href="index.html" class="nav-logo"><img src="logo.png" alt="Grevent"></a>
            <ul class="nav-links" id="navLinks">
                <li><a href="om-oss.html">Om oss</a></li>
                <li><a href="utstyr.html">Utstyr</a></li>
                <li><a href="pakker.html">Pakkeløsninger</a></li>
                <li><a href="send-filer.html">Send filer</a></li>
                <li><a href="kontakt.html" class="nav-cta">Kontakt oss</a></li>
            </ul>
            <button class="nav-toggle" id="navToggle" aria-label="Meny"><span></span><span></span><span></span></button>
        </div>
    </nav>

    <div class="page-header">
        <div class="container">
            <div class="section-label">Pakkeløsninger</div>
            <h1 id="pkg-title">Velg pakken som passer</h1>
            <p id="pkg-desc"></p>
        </div>
    </div>

    <section class="section">
        <div class="container">
            <div class="package-grid" id="package-grid"></div>
            <p class="pkg-footer-note fade-up" id="pkg-footer"></p>
        </div>
    </section>

    <footer class="footer">
        <div class="container">
            <div class="footer-inner">
                <div class="footer-brand">
                    <div class="footer-logo"><img src="logo.png" alt="Grevent"></div>
                    <div class="footer-tagline">Teknisk produksjon for konferanser og events</div>
                </div>
                <div class="footer-nav-group">
                    <h4>Sider</h4>
                    <a href="om-oss.html">Om oss</a>
                    <a href="utstyr.html">Utstyr</a>
                    <a href="pakker.html">Pakkeløsninger</a>
                    <a href="send-filer.html">Send filer</a>
                    <a href="kontakt.html">Kontakt</a>
                </div>
                <div class="footer-contact" id="footer-contact"></div>
            </div>
            <div class="footer-bottom">
                <span>&copy; 2015–2026 Grevent AS. Alle rettigheter reservert.</span>
                <span id="footer-orgnr"></span>
            </div>
        </div>
    </footer>

    <script>
    const checkSvg = '<svg class="package-check" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="20 6 9 17 4 12"/></svg>';

    function ensureArray(val) {
        if (Array.isArray(val)) return val;
        if (typeof val === 'string' && val.trim()) return val.split(',').map(s => s.trim());
        return [];
    }

    const navToggle = document.getElementById('navToggle');
    const navLinks = document.getElementById('navLinks');
    navToggle.addEventListener('click', () => navLinks.classList.toggle('open'));
    navLinks.querySelectorAll('a').forEach(link => link.addEventListener('click', () => navLinks.classList.remove('open')));

    const currentFile = window.location.pathname.split('/').pop() || 'index.html';
    navLinks.querySelectorAll('a').forEach(link => {
        if (link.getAttribute('href') === currentFile) link.classList.add('active');
    });

    const observer = new IntersectionObserver((entries) => {
        entries.forEach(entry => { if (entry.isIntersecting) entry.target.classList.add('visible'); });
    }, { threshold: 0.1, rootMargin: '0px 0px -50px 0px' });
    document.querySelectorAll('.fade-up').forEach(el => observer.observe(el));

    window.addEventListener('scroll', () => {
        document.getElementById('navbar').classList.toggle('scrolled', window.scrollY > 10);
    });

    fetch('content/site.json')
        .then(r => r.json())
        .then(data => {
            document.getElementById('pkg-title').textContent = data.pakker.tittel;
            document.getElementById('pkg-desc').textContent = data.pakker.beskrivelse;
            document.getElementById('pkg-footer').textContent = data.pakker.bunntekst;

            const pakkeliste = ensureArray(data.pakker.liste);
            document.getElementById('package-grid').innerHTML = pakkeliste.map(pkg => `
                <div class="package-card ${pkg.featured ? 'featured' : ''} fade-up">
                    ${pkg.featured ? '<div class="package-badge">Mest populær</div>' : ''}
                    <div class="package-name">${pkg.navn || ''}</div>
                    <div class="package-desc">${pkg.beskrivelse || ''}</div>
                    <div class="package-price">
                        <div class="package-price-label">Fra</div>
                        <div class="package-price-value">${pkg.pris || ''} <span class="package-price-unit">kr / dag</span></div>
                    </div>
                    <ul class="package-includes">${ensureArray(pkg.inkluderer).map(item => `<li>${checkSvg}${item}</li>`).join('')}</ul>
                    <a href="kontakt.html" class="btn ${pkg.featured ? 'btn-primary' : 'btn-secondary'}">Be om tilbud</a>
                </div>
            `).join('');

            document.getElementById('footer-contact').innerHTML = `
                <a href="mailto:${data.kontakt.epost}">${data.kontakt.epost}</a><br>
                <a href="tel:${data.kontakt.telefon.replace(/\s/g,'')}">${data.kontakt.telefon}</a><br>
                ${data.kontakt.lokasjon}
            `;
            document.getElementById('footer-orgnr').textContent = `Org.nr: ${data.kontakt.orgnr}`;

            document.querySelectorAll('.fade-up').forEach(el => observer.observe(el));
        })
        .catch(err => console.error('Feil:', err));
    </script>
</body>
</html>
